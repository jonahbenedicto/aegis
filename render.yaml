databases:
  - name: aegis_db
    plan: free
    region: singapore


services:
  - type: web
    name: aegis_api
    env: python
    plan: free
    region: singapore
    buildCommand: "cd api && pip install -r requirements.txt"
    startCommand: "cd api && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: aegis_db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

  - type: web
    name: aegis_web
    env: node
    plan: free
    region: singapore
    buildCommand: "cd web && npm install && npm run build"
    startCommand: "cd web && npm run start"
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: aegis_api
          envVarKey: RENDER_EXTERNAL_URL